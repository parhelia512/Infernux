GITHUB_OWNER = "ChenlizheMe"
GITHUB_REPO = "Infernux"
GITHUB_REPOSITORY_ID = "R_kgDOO_wV3A"

[[r2_buckets]]
binding = "COMMUNITY_UPLOADS"
