name: Website Quality

on:
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/website-quality.yml"
      - ".github/workflows/build-wiki.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "docs/**"
      - ".github/workflows/website-quality.yml"
      - ".github/workflows/build-wiki.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: website-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify docs, indexes, and static build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify generated indexes are current
        run: node docs/tools/build-doc-index.mjs --check

      - name: Verify curated core API guidance is current
        run: node docs/tools/apply-api-curation.mjs --check

      - name: Verify API release snapshot and comparison
        run: node docs/tools/build-api-diff.mjs --check

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/wiki/requirements.txt

      - name: Install documentation dependencies
        run: python -m pip install -r docs/wiki/requirements.txt

      - name: Build Wiki in strict mode
        env:
          PYTHONIOENCODING: utf-8
        run: python -m mkdocs build --strict --clean -f docs/wiki/mkdocs.yml

      - name: Optimize static Wiki output
        run: node docs/tools/optimize-static-site.mjs

      - name: Enforce static performance budget
        run: node docs/tools/check-static-budget.mjs

      - name: Verify website contracts
        run: node docs/tools/verify-site.mjs

      - name: Verify committed Wiki output is current
        run: git diff --exit-code -- docs/wiki/site
