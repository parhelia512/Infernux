name: Build on Version Bump

# Builds the native module + wheel whenever the project version in
# pyproject.toml changes on master/main (plus manual dispatch).
#
# Outputs:
# - Windows wheel + InfernuxHubInstaller.exe uploaded as workflow artifacts
# - GitHub Release v<version> using UpdateLog.md as the release notes

on:
  push:
    branches: [master, main]
    paths:
      - "pyproject.toml"
      - "UpdateLog.md"
      - ".github/workflows/build-on-version.yml"
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: Rebuild and replace assets even when this version already has a GitHub Release
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: build-on-version-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-version-change:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Compare project version with parent commit
        id: check
        shell: bash
        run: |
          get_ver() { python3 -c "import tomllib,sys; print(tomllib.load(open(sys.argv[1],'rb'))['project']['version'])" "$1"; }
          NEW_VER=$(get_ver pyproject.toml)
          OLD_VER=""
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            git show HEAD^:pyproject.toml > /tmp/old_pyproject.toml 2>/dev/null && \
              OLD_VER=$(get_ver /tmp/old_pyproject.toml) || OLD_VER=""
          fi
          echo "version=$NEW_VER" >> "$GITHUB_OUTPUT"
          RELEASE_EXISTS=false
          HTTP_STATUS=""
          CURL_EXIT=0
          for ATTEMPT in 1 2 3 4 5; do
            set +e
            HTTP_STATUS=$(curl --silent --show-error --output /tmp/infernux-release.json --write-out "%{http_code}" \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer $GH_TOKEN" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/tags/v$NEW_VER")
            CURL_EXIT=$?
            set -e
            if [ "$CURL_EXIT" -eq 0 ] && { [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "404" ]; }; then
              break
            fi
            if [ "$ATTEMPT" -lt 5 ] && { [ "$CURL_EXIT" -ne 0 ] || [ "$HTTP_STATUS" = "429" ] || [[ "$HTTP_STATUS" == 5?? ]]; }; then
              echo "Release lookup attempt $ATTEMPT failed (curl=$CURL_EXIT, HTTP=$HTTP_STATUS); retrying."
              sleep $((ATTEMPT * 3))
              continue
            fi
            break
          done
          if [ "$CURL_EXIT" -ne 0 ]; then
            echo "::error::Could not verify whether Release v$NEW_VER exists; refusing to rebuild an unverified version."
            exit "$CURL_EXIT"
          fi
          case "$HTTP_STATUS" in
            200) RELEASE_EXISTS=true ;;
            404) RELEASE_EXISTS=false ;;
            *)
              echo "::error::GitHub returned HTTP $HTTP_STATUS while checking Release v$NEW_VER; refusing to rebuild an unverified version."
              cat /tmp/infernux-release.json
              exit 1
              ;;
          esac
          FORCE_REBUILD="${{ github.event_name == 'workflow_dispatch' && inputs.force_rebuild || false }}"

          if [ "$RELEASE_EXISTS" = "true" ] && [ "$FORCE_REBUILD" != "true" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Release v$NEW_VER already exists; skipping rebuild. Use workflow_dispatch with force_rebuild=true to replace its assets."
          elif [ "$NEW_VER" != "$OLD_VER" ] || [ "$RELEASE_EXISTS" != "true" ] || [ "$FORCE_REBUILD" = "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Build requested. event='${{ github.event_name }}', old='$OLD_VER', new='$NEW_VER', release_exists='$RELEASE_EXISTS', force_rebuild='$FORCE_REBUILD'"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged; skipping build."
          fi

  build-windows:
    needs: detect-version-change
    if: needs.detect-version-change.outputs.changed == 'true'
    runs-on: windows-2022
    timeout-minutes: 120
    env:
      VULKAN_SDK_VERSION: "1.3.296.0"
      GH_TOKEN: ${{ github.token }}
      VERSION: ${{ needs.detect-version-change.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Vulkan SDK
        id: cache-vulkan
        uses: actions/cache@v4
        with:
          path: C:\VulkanSDK\${{ env.VULKAN_SDK_VERSION }}
          # The cached SDK includes a private Vulkan Runtime loader for
          # headless build tools. Hosted runners do not provide one.
          key: vulkan-sdk-${{ env.VULKAN_SDK_VERSION }}-windows-loader-v2

      - name: Install Vulkan SDK (silent, with SPIRV-Cross)
        if: steps.cache-vulkan.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://sdk.lunarg.com/sdk/download/$env:VULKAN_SDK_VERSION/windows/VulkanSDK-$env:VULKAN_SDK_VERSION-Installer.exe"
          Invoke-WebRequest -Uri $url -OutFile vulkan_sdk.exe
          Start-Process -Wait -FilePath .\vulkan_sdk.exe -ArgumentList `
            "--accept-licenses","--default-answer","--confirm-command","install"

      - name: Stage Vulkan loader for headless build tools
        shell: pwsh
        run: |
          $sdk = "C:\VulkanSDK\$env:VULKAN_SDK_VERSION"
          $sdkLoader = Join-Path $sdk "Bin\vulkan-1.dll"
          if (!(Test-Path $sdkLoader)) {
            $runtimeUrl = "https://sdk.lunarg.com/sdk/download/$env:VULKAN_SDK_VERSION/windows/VulkanRT-$env:VULKAN_SDK_VERSION-Components.zip"
            $runtimeZip = Join-Path $env:RUNNER_TEMP "VulkanRT-Components.zip"
            $runtimeDir = Join-Path $env:RUNNER_TEMP "VulkanRT-Components"
            Invoke-WebRequest -Uri $runtimeUrl -OutFile $runtimeZip
            Expand-Archive -Path $runtimeZip -DestinationPath $runtimeDir -Force
            $loader = Get-ChildItem $runtimeDir -Recurse -File -Filter vulkan-1.dll |
              Where-Object { $_.FullName -match '[\\/]x64[\\/]' } |
              Select-Object -First 1
            if (!$loader) {
              throw "The Vulkan Runtime package did not contain an x64 vulkan-1.dll."
            }
            Copy-Item $loader.FullName $sdkLoader -Force
          }
          "VULKAN_SDK=$sdk" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          (Join-Path $sdk "Bin") | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Python build dependencies
        run: python -m pip install -r requirements.txt nuitka ordered-set zstandard

      - name: Configure (CMake preset release)
        shell: pwsh
        run: |
          $env:VULKAN_SDK = "C:\VulkanSDK\$env:VULKAN_SDK_VERSION"
          cmake --preset release

      - name: Build native module
        shell: pwsh
        run: |
          $env:VULKAN_SDK = "C:\VulkanSDK\$env:VULKAN_SDK_VERSION"
          cmake --build --preset release --target _Infernux

      - name: Stage private Vulkan loader beside CI native module
        shell: pwsh
        run: |
          $loader = Join-Path $env:VULKAN_SDK "Bin\vulkan-1.dll"
          $nativeDir = Join-Path $env:GITHUB_WORKSPACE "out\build\Release"
          if (!(Test-Path $loader)) { throw "Private Vulkan loader is missing: $loader" }
          if (!(Test-Path $nativeDir)) { throw "Native module directory is missing: $nativeDir" }
          Copy-Item $loader (Join-Path $nativeDir "vulkan-1.dll") -Force

      - name: Prebuild release Player Runtime Pack
        shell: pwsh
        run: cmake --build --preset release --target prebuild_player_runtime

      - name: Build wheel
        env:
          INFERNUX_SOURCE_DIR: ${{ github.workspace }}
        run: python -m build --wheel --no-isolation --outdir release-dist

      - name: Build Hub installer
        shell: pwsh
        run: |
          $env:VULKAN_SDK = "C:\VulkanSDK\$env:VULKAN_SDK_VERSION"
          cmake --build --preset packaging-installer
          if (!(Test-Path "dist/installer/InfernuxHubInstaller.exe")) {
            throw "Expected installer not found: dist/installer/InfernuxHubInstaller.exe"
          }
          New-Item -ItemType Directory -Path release-dist -Force | Out-Null
          Copy-Item dist/installer/InfernuxHubInstaller.exe "release-dist/InfernuxHubInstaller-$env:VERSION.exe"

      - name: Generate full and incremental Hub update assets
        shell: pwsh
        run: |
          $baseManifest = $null
          $previous = gh release list --repo "$env:GITHUB_REPOSITORY" --limit 20 --exclude-drafts --exclude-pre-releases --json tagName | ConvertFrom-Json |
            Where-Object { $_.tagName -ne "v$env:VERSION" } | Select-Object -First 1
          if ($previous) {
            $previousRelease = gh release view $previous.tagName --repo "$env:GITHUB_REPOSITORY" --json assets | ConvertFrom-Json
            if ($previousRelease.assets.name -contains "InfernuxHub-manifest.json") {
              New-Item -ItemType Directory -Path release-base -Force | Out-Null
              gh release download $previous.tagName --repo "$env:GITHUB_REPOSITORY" --pattern InfernuxHub-manifest.json --dir release-base
              if ($LASTEXITCODE -eq 0 -and (Test-Path release-base/InfernuxHub-manifest.json)) {
                $baseManifest = "release-base/InfernuxHub-manifest.json"
              }
            }
          }
          $args = @(
            "packaging/incremental_update.py",
            "--hub-dir", "dist/Infernux Hub",
            "--version", $env:VERSION,
            "--output-dir", "release-dist"
          )
          if ($baseManifest) { $args += @("--base-manifest", $baseManifest) }
          python @args
          if ($LASTEXITCODE -ne 0) { throw "Hub update artifact generation failed." }
          $lines = Get-ChildItem release-dist -File | Sort-Object Name | ForEach-Object {
            "$((Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant())  $($_.Name)"
          }
          [IO.File]::WriteAllLines((Join-Path $PWD "release-dist/SHA256SUMS.txt"), $lines, [Text.UTF8Encoding]::new($false))

      - uses: actions/upload-artifact@v4
        with:
          name: infernux-${{ needs.detect-version-change.outputs.version }}-release
          path: release-dist/*
          if-no-files-found: error

  publish-github-release:
    needs: [detect-version-change, build-windows]
    if: needs.detect-version-change.outputs.changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
      VERSION: ${{ needs.detect-version-change.outputs.version }}
      FORCE_REBUILD: ${{ github.event_name == 'workflow_dispatch' && inputs.force_rebuild || false }}
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: infernux-${{ needs.detect-version-change.outputs.version }}-release
          path: release-dist
          merge-multiple: true

      - name: Verify release assets
        shell: bash
        run: |
          find release-dist -type f -print | sort
          wheel_count=$(find release-dist -type f -name '*.whl' | wc -l | tr -d ' ')
          installer_count=$(find release-dist -type f -name 'InfernuxHubInstaller-*.exe' | wc -l | tr -d ' ')
          if [ "$wheel_count" -lt 1 ]; then
            echo "Expected at least 1 Windows wheel file, found $wheel_count" >&2
            exit 1
          fi
          if [ "$installer_count" -lt 1 ]; then
            echo "Expected a versioned InfernuxHubInstaller, found $installer_count" >&2
            exit 1
          fi
          for required in InfernuxHub-manifest.json SHA256SUMS.txt; do
            if [ ! -s "release-dist/$required" ]; then
              echo "Expected $required" >&2
              exit 1
            fi
          done
          if [ ! -s UpdateLog.md ]; then
            echo "UpdateLog.md is required and must not be empty; it is used as the GitHub Release body." >&2
            exit 1
          fi

      - name: Create or update GitHub Release
        shell: bash
        run: |
          tag="v${VERSION}"
          mapfile -t files < <(find release-dist -type f | sort)

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            if [ "$FORCE_REBUILD" != "true" ]; then
              echo "Release $tag was created after version detection; leaving its existing assets untouched."
              exit 0
            fi
            echo "Explicit force rebuild requested for $tag; replacing release assets."
            gh release upload "$tag" "${files[@]}" --clobber --repo "$GITHUB_REPOSITORY"
            gh release edit "$tag" --notes-file UpdateLog.md --latest --repo "$GITHUB_REPOSITORY"
          else
            echo "Creating release $tag."
            gh release create "$tag" "${files[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "Infernux v${VERSION}" \
              --notes-file UpdateLog.md \
              --latest
          fi
