name: Build Wiki

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/build-wiki.yml"
      - "docs/wiki/docs/**"
      - "docs/wiki/theme/**"
      - "docs/wiki/mkdocs.yml"
      - "docs/wiki/requirements.txt"
      - "docs/*.html"
      - "docs/*.json"
      - "docs/css/**"
      - "docs/js/**"
      - "docs/tools/**"
      - "docs/docs-manifest.json"
      - "docs/learning-paths.json"
      - "UpdateLog.md"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-wiki-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and commit website
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/wiki/requirements.txt

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r docs/wiki/requirements.txt

      # API Markdown is intentionally maintained only through update_api_docs.bat.
      # Publishing consumes the checked-in result and never scans engine sources.
      - name: Verify checked-in Wiki configuration
        run: node docs/tools/normalize-wiki-config.mjs --check

      - name: Verify checked-in curated API guidance
        run: node docs/tools/apply-api-curation.mjs --check

      - name: Generate content-hashed Wiki catalog
        run: node docs/tools/build-wiki-catalog.mjs

      - name: Stamp documentation build provenance
        env:
          DOCS_SOURCE_COMMIT: ${{ github.sha }}
        run: node docs/tools/stamp-docs-manifest.mjs

      - name: Generate machine-readable documentation indexes
        run: node docs/tools/build-doc-index.mjs

      - name: Verify curated front matter is synchronized
        run: node docs/tools/sync-curated-frontmatter.mjs --check

      - name: Generate documentation health report
        run: node docs/tools/build-doc-health.mjs

      - name: Generate structured release notes
        run: node docs/tools/build-release-notes.mjs

      - name: Generate compact Agent documentation index
        run: node docs/tools/build-llms-index.mjs

      - name: Test compact Agent documentation index
        run: node docs/tools/test-llms-index.mjs

      - name: Generate full Agent documentation corpus
        run: node docs/tools/build-agent-corpus.mjs

      - name: Build static wiki
        env:
          PYTHONIOENCODING: utf-8
        run: python -m mkdocs build --clean -f docs/wiki/mkdocs.yml

      - name: Optimize static Wiki output
        run: node docs/tools/optimize-static-site.mjs

      - name: Generate unified sitemap
        run: node docs/tools/build-sitemap.mjs

      - name: Generate route-localized bundles
        run: node docs/tools/build-i18n.mjs

      - name: Generate deterministic Service Worker
        run: node docs/tools/build-service-worker.mjs

      - name: Verify responsive evidence images
        run: node docs/tools/check-image-variants.mjs

      - name: Verify installable PWA assets
        run: node docs/tools/check-pwa-assets.mjs

      - name: Test PWA installation interaction
        run: node docs/tools/test-pwa-install.mjs

      - name: Test route-localized bundles
        run: node docs/tools/test-i18n-bundles.mjs

      - name: Test download trust boundary
        run: node docs/tools/test-download-client.mjs

      - name: Test home starter interaction
        run: node docs/tools/test-home-client.mjs

      - name: Audit shipped runtime assets and visual state
        run: node docs/tools/check-runtime-assets.mjs

      - name: Test runtime visual state
        run: node docs/tools/test-runtime-visual-state.mjs

      - name: Test installed website update flow
        run: node docs/tools/test-service-worker-update.mjs

      - name: Enforce static performance budget
        run: node docs/tools/check-static-budget.mjs

      - name: Enforce design-token color contrast
        run: node docs/tools/check-color-contrast.mjs

      - name: Verify website contracts
        run: node docs/tools/verify-site.mjs

      - name: Test community client
        run: node docs/tools/test-community-client.mjs

      - name: Test community readiness rules
        run: node docs/tools/test-community-readiness.mjs

      - name: Test generated documentation context
        run: node docs/tools/test-doc-context.mjs

      - name: Test bilingual section continuity
        run: node docs/tools/test-doc-language-continuity.mjs

      - name: Test Wiki learning continuity
        run: node docs/tools/test-wiki-learning-progress.mjs

      - name: Test recent-document continuity
        run: node docs/tools/test-doc-recent.mjs

      - name: Test documentation printing
        run: node docs/tools/test-doc-print.mjs

      - name: Test documentation search
        run: node docs/tools/test-doc-search.mjs

      - name: Test documentation health client
        run: node docs/tools/test-doc-health.mjs

      - name: Test website health reporting
        run: node docs/tools/test-website-health-report.mjs

      - name: Test offline caching strategy
        run: node docs/tools/test-service-worker.mjs

      - name: Test mobile navigation focus management
        run: node docs/tools/test-mobile-navigation.mjs

      - name: Test responsive layout contracts
        run: node docs/tools/test-responsive-contracts.mjs

      - name: Commit generated wiki output
        shell: bash
        run: |
          git add docs/wiki/docs docs/wiki/site docs/wiki/mkdocs.yml docs/wiki/mkdocs_api_nav.yml docs/assets/wiki-docs*.json docs/docs-manifest.json docs/docs-index.json docs/docs-health.json docs/api-index.json docs/release-notes.json docs/llms.txt docs/llms-full.txt docs/wiki.html
          git add -A -- ':(glob)docs/css/wiki-template.*.css'
          git add docs/sw.js docs/sitemap.xml docs/js/i18n*.js

          if git diff --cached --quiet; then
            echo "No generated wiki changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: regenerate wiki [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
