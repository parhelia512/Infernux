name: Website Health

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: read

concurrency:
  group: website-production-health
  cancel-in-progress: true

jobs:
  health:
    name: Check deployed GitHub Pages site
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check production routes and machine indexes
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node docs/tools/check-deployed-site.mjs --base-url https://infernux-engine.com --report artifacts/website-health.json

      - name: Upload structured website health report
        if: ${{ always() && hashFiles('artifacts/website-health.json') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: website-health-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/website-health.json
          if-no-files-found: error
          retention-days: 30

      - name: Audit GitHub community readiness
        env:
          GITHUB_TOKEN: ${{ github.token }}
        # Remove --allow-uninstalled after the repository administrator installs Giscus.
        run: node docs/tools/check-community-readiness.mjs --allow-uninstalled
