name: Preset Build And Headless Tests

on:
  pull_request:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: preset-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-headless:
    runs-on: windows-2022
    timeout-minutes: 120
    env:
      VULKAN_SDK_VERSION: "1.3.296.0"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: infernux
          python-version: "3.12"
          auto-activate-base: false

      - name: Cache Vulkan SDK
        id: cache-vulkan
        uses: actions/cache@v4
        with:
          path: C:\VulkanSDK\${{ env.VULKAN_SDK_VERSION }}
          key: vulkan-sdk-${{ env.VULKAN_SDK_VERSION }}-windows

      - name: Install Vulkan SDK
        if: steps.cache-vulkan.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          conda activate infernux
          $url = "https://sdk.lunarg.com/sdk/download/$env:VULKAN_SDK_VERSION/windows/VulkanSDK-$env:VULKAN_SDK_VERSION-Installer.exe"
          Invoke-WebRequest -Uri $url -OutFile vulkan_sdk.exe
          Start-Process -Wait -FilePath .\vulkan_sdk.exe -ArgumentList `
            "--accept-licenses","--default-answer","--confirm-command","install"

      - name: Install build and test dependencies
        shell: pwsh
        run: |
          conda activate infernux
          python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Configure debug preset
        shell: pwsh
        run: |
          conda activate infernux
          $env:VULKAN_SDK = "C:\VulkanSDK\$env:VULKAN_SDK_VERSION"
          cmake --preset debug

      - name: Build debug preset
        shell: pwsh
        run: |
          conda activate infernux
          $env:VULKAN_SDK = "C:\VulkanSDK\$env:VULKAN_SDK_VERSION"
          cmake --build --preset debug

      - name: Provide Vulkan loader for headless tests
        shell: pwsh
        run: |
          if (Test-Path "$env:WINDIR\System32\vulkan-1.dll") {
            exit 0
          }
          $archive = Join-Path $env:RUNNER_TEMP "vulkan-runtime-components.zip"
          $runtimeRoot = Join-Path $env:RUNNER_TEMP "vulkan-runtime"
          $url = "https://sdk.lunarg.com/sdk/download/$env:VULKAN_SDK_VERSION/windows/vulkan-runtime-components.zip"
          Invoke-WebRequest -Uri $url -OutFile $archive
          Expand-Archive -LiteralPath $archive -DestinationPath $runtimeRoot -Force
          $runtimeBin = Join-Path $runtimeRoot "VulkanRT-$env:VULKAN_SDK_VERSION-Components\x64"
          if (-not (Test-Path (Join-Path $runtimeBin "vulkan-1.dll"))) {
            throw "Vulkan runtime archive does not contain the expected x64 loader."
          }
          $runtimeBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Run preset tests
        shell: pwsh
        run: |
          conda activate infernux
          $env:VULKAN_SDK = "C:\VulkanSDK\$env:VULKAN_SDK_VERSION"
          ctest --preset debug --output-on-failure
