title: "[General] "
body:
  - type: markdown
    attributes:
      value: |
        Use General for open-ended Infernux conversation that is not a focused support question, feature proposal, or showcase.

        综合讨论适合不属于明确问答、功能提案或作品展示的 Infernux 话题。
  - type: textarea
    id: topic
    attributes:
      label: Topic / 话题
      description: Explain the context and what you would like the community to discuss. / 说明背景以及你希望社区讨论的内容。
      placeholder: What should readers know before joining the conversation?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Relevant version / 相关版本
      description: Add an engine release or commit when the topic depends on a specific build. / 如果话题依赖特定构建，请填写引擎版本或提交。
      placeholder: v0.2.1 or commit SHA
  - type: textarea
    id: references
    attributes:
      label: References / 参考资料
      description: Link related documentation, discussions, code, or screenshots. / 链接相关文档、讨论、代码或截图。
