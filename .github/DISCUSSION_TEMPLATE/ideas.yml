title: "[Idea] "
body:
  - type: markdown
    attributes:
      value: |
        Ideas are for exploring a product or engine direction before it becomes accepted implementation work. Describe the user problem first.

        想法区用于在进入正式实现前讨论产品或引擎方向，请先说明用户问题。
  - type: dropdown
    id: area
    attributes:
      label: Area / 领域
      options:
        - Rendering / 渲染
        - Physics / 物理
        - Python API
        - Editor or Hub / 编辑器或 Hub
        - UI system / UI 系统
        - Asset pipeline / 资源管线
        - Packaging or distribution / 打包或分发
        - Documentation or website / 文档或网站
        - Other / 其他
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity / 问题或机会
      description: Who encounters this, and what workflow is currently difficult or impossible? / 谁会遇到这个问题？当前哪些工作流困难或无法完成？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed direction / 建议方向
      description: Describe the behavior or outcome, not only an implementation detail. / 描述期望行为或结果，而不只是实现细节。
    validations:
      required: true
  - type: textarea
    id: tradeoffs
    attributes:
      label: Alternatives and tradeoffs / 替代方案与取舍
      description: Note workarounds, costs, compatibility concerns, or ideas you rejected. / 说明现有替代方案、成本、兼容性问题或已排除的方案。
