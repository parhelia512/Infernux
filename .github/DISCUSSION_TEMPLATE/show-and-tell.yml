title: "[Showcase] "
body:
  - type: markdown
    attributes:
      value: |
        Share something built with or for Infernux: a scene, game, tool, renderer experiment, workflow, or lesson learned.

        分享使用 Infernux 制作或为 Infernux 制作的场景、游戏、工具、渲染实验、工作流或经验。
  - type: textarea
    id: showcase
    attributes:
      label: What did you make? / 你做了什么？
      description: Explain the result and the part of Infernux it uses. / 说明成果以及使用了 Infernux 的哪些部分。
    validations:
      required: true
  - type: textarea
    id: media
    attributes:
      label: Links and media / 链接与媒体
      description: Add a repository, playable build, screenshots, video, or project page when public. / 如果内容公开，可添加仓库、可运行构建、截图、视频或项目页面。
  - type: textarea
    id: lessons
    attributes:
      label: What did you learn? / 你学到了什么？
      description: Share useful constraints, surprises, or techniques for future readers. / 分享对后来读者有用的限制、意外情况或技巧。
  - type: input
    id: version
    attributes:
      label: Infernux version / Infernux 版本
      placeholder: v0.2.1 or commit SHA
