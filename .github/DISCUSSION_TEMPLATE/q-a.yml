title: "[Q&A] "
body:
  - type: markdown
    attributes:
      value: |
        Ask one focused, answerable question. Include the smallest useful context so another person can reproduce your setup or explain the relevant contract.

        请提出一个明确且可回答的问题，并提供足够的最小上下文，让其他人能够复现设置或解释相关契约。
  - type: textarea
    id: goal
    attributes:
      label: What are you trying to do? / 你想完成什么？
      description: Describe the intended result before the failure or uncertainty. / 先说明预期结果，再描述失败或疑问。
    validations:
      required: true
  - type: textarea
    id: attempted
    attributes:
      label: What have you tried? / 你已经尝试了什么？
      description: Include relevant code, settings, documentation, and the first useful error. / 包含相关代码、设置、已阅读文档和第一条有效错误。
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Engine version or commit / 引擎版本或提交
      placeholder: v0.2.9 or commit SHA
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment / 环境
      description: Add OS, GPU, Python, or toolchain details only when relevant. / 仅在相关时填写系统、GPU、Python 或工具链信息。
